# Video MCP server configuration for nat-agent.
# Auto-discovered by the launcher and passed as --config to video_mcp_server.
#
# recordings_dir MUST match xr_media_hub.yaml's video_recording.out_dir.
# The MCP server reads NVENC H.264 chunks from this directory for the
# get_frame_from_time (with second_ago > 0) and query_video tools, and
# connects to the hub as a ProcessorEndpoint for live frames
# (get_frame_from_time with second_ago == 0).

recordings_dir: /dev/shm/xr-ai/recordings    # must match xr_media_hub.yaml
out_dir:        /tmp/xr_video_queries        # PNGs returned by get_*_frame land here
hub_pub:        ipc:///tmp/xr_hub_pub
hub_push:       ipc:///tmp/xr_hub_in
host:           0.0.0.0
port:           8210
gpu_id:         0
