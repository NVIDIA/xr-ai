# NAT workflow configuration for the nat-agent sample.
#
# Loaded by NatBackend at startup. Placeholders (${...}) are substituted
# from WorkerConfig at load time — see worker/config.py's
# ``load_nat_workflow_dict()``.
#
# Architecture (NAT 1.6+):
#   tool_calling_agent (NAT + LangChain + LangGraph)
#       │
#       ├── vlm    (mcp_client function group → vlm-mcp :8220)
#       │       └── ask_image
#       │
#       └── vid    (mcp_client function group → video-mcp :8210)
#               ├── get_frame_from_time
#               ├── get_video_stats
#               ├── query_video
#               ├── list_live_participants
#               └── list_recorded_participants
#
# ``tool_names`` lists each function GROUP — NAT 1.6's ``builder.get_tools``
# expands a ``FunctionGroupRef`` to every accessible function in that group
# (controlled by ``include`` / ``exclude``). No NAT-side wrappers are needed:
# the LLM sees every MCP tool by its underlying name. The participant_id that
# video tools require travels in a per-turn ``[Live participant_id: <pid>]``
# preamble that the worker prepends to the user message.

llms:
  local_llm:
    _type: openai
    model_name: llm
    base_url: ${llm_base_url}
    api_key: EMPTY
    temperature: ${llm_temperature}
    top_p: ${llm_top_p}
    request_timeout: ${llm_request_timeout_s}
    max_tokens: ${llm_max_tokens}
    # Tool-calling streaming via the OpenAI client + nemotron3_nano + vLLM
    # has corner cases around partial JSON; the reference samples use this
    # flag for the same reason.
    disable_streaming: tool_calling
    # Disable Nemotron-3-Nano's <think>...</think> reasoning preamble.
    # The model card recommends temperature=0.6, top_p=0.95 (already set
    # above) for tool calling specifically — and reasoning OFF for tool
    # calling specifically — because the reasoning preamble adds 600-1500
    # generated tokens per LLM call. At the ~30 tok/s decode rate of this
    # eager-mode FP4 deployment, that is the difference between a 5 s and
    # a 25 s tool-selection round-trip.
    #
    # Mechanism: vLLM reads ``chat_template_kwargs.enable_thinking`` from
    # the request body via the model's chat template. NAT's OpenAI config
    # has ``extra="allow"`` so this extra_body field passes through into
    # LangChain's ChatOpenAI(...) and then into the OpenAI Python client,
    # which forwards it as additional JSON in /v1/chat/completions.
    #
    # Re-enable (set to true, or remove the block) if you observe the LLM
    # over-triggering tools on simple non-visual queries — that is the
    # known failure mode of reasoning-off in this model family. The
    # system prompt's "skip every tool" instruction for non-visual
    # questions mitigates but does not eliminate it.
    extra_body:
      chat_template_kwargs:
        enable_thinking: false

function_groups:
  # vlm-mcp — pure path-based VLM Q&A. Single tool: ask_image.
  # Tool descriptions seen by the LLM are the docstrings on the MCP
  # server's @mcp.tool() functions, picked up automatically via the
  # streamable-http list_tools handshake. Do NOT override them here.
  vlm:
    _type: mcp_client
    server:
      transport: streamable-http
      url: ${vlm_mcp_url}
    tool_call_timeout: 60

  # video-mcp — full tool surface (live + recorded frames + roster + stats).
  vid:
    _type: mcp_client
    server:
      transport: streamable-http
      url: ${video_mcp_url}
    tool_call_timeout: 30

workflow:
  _type: tool_calling_agent
  llm_name: local_llm
  # Listing a function-group name expands to every accessible tool in that
  # group — see nat.builder.workflow_builder.WorkflowBuilder.get_tools.
  tool_names:
    - vlm
    - vid
  system_prompt: ${llm_system_prompt}
  # Roomy enough for: roster query -> get frame -> ask_image -> retry.
  max_iterations: 6
  max_history: 8
