# space-mcp config for simple-vlm-example.
# Topological place memory: persists per-region centroids + topology
# under map_dir.  Wipe that directory (or call the reset_map MCP tool)
# to start a fresh map.

map_dir: /tmp/xr-ai/simple-vlm-example-space-map

device:                auto
dinov2_model:          facebook/dinov2-small
match_threshold:       0.78
new_region_min_streak: 3
centroid_alpha:        0.05

host: 0.0.0.0
port: 8245

# Stream the topological-graph + object catalog to a Rerun viewer.
# Launch the viewer from the space-mcp venv so the binary + SDK match:
#     uv run --directory agent-mcp-servers/space-mcp rerun
# Otherwise the viewer drops messages with
#     `Bad chunk schema: Missing row_id column`.
# Set to null to disable the viz path entirely.
rerun_addr: 127.0.0.1:9876
