# kimera-mcp config for simple-vlm-example.
#
# Wraps MIT-SPARK Kimera-VIO (BSD-2-Clause) running in the `kimera_vio`
# docker image as a long-running streaming pipeline.  The MCP server
# spawns the container at startup; frames + IMU + intrinsics travel
# over an AF_UNIX socket bind-mounted from the host.
#
# First-run note: if the `kimera_vio` image isn't already on the host,
# kimera-mcp will clone Kimera-VIO into `kimera_vio_src_cache` and run
# `docker build` for both the deps image and the overlay image
# automatically.  The first build takes 30+ minutes; subsequent starts
# skip straight to `docker run`.

# Host directory that holds the AF_UNIX socket the live binary exposes.
# Bind-mounted into the container as /sock.  Must be writable by the
# user running this MCP server.
sock_dir:      /tmp/xr-ai/kimera-sock

docker_image:  kimera_vio
deps_image:    kimera_vio_deps
container_name: xr_ai_kimera_live
params_folder_in_image: /opt/kimera-params/EurocMonoLive

# Auto-build the docker image on first run if it isn't present.  Set
# to false in offline / sandboxed environments where you'd rather
# fail fast than have a 30-minute build kick off implicitly.
build_if_missing:      true
kimera_vio_repo:       https://github.com/MIT-SPARK/Kimera-VIO.git
kimera_vio_src_cache:  ~/.cache/xr-ai/Kimera-VIO

# Wait at most this many seconds for the container to bind its socket.
startup_timeout_s: 30.0

# Default intrinsics — pushed eagerly so the pipeline is initialised
# before the first frame.  The web client publishes camera_meta on
# first `startCamera`; the worker derives K from facingMode + UA and
# calls kimera-mcp.set_camera_intrinsics to override these.
default_width:  640
default_height: 480
default_fx:     458.654
default_fy:     457.296
default_cx:     367.215
default_cy:     248.375

host: 0.0.0.0
port: 8250
