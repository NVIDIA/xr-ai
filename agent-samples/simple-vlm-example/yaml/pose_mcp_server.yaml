# pose-mcp config for simple-vlm-example.
# The map persists across stack restarts under map_dir — wipe that
# directory (or call the reset_map MCP tool) if you want the next session
# to start a fresh world frame.

map_dir: /tmp/xr-ai/simple-vlm-example-pose-map

device:             auto
moge_model:         Ruicheng/moge-2-vits-normal

# Camera horizontal FOV (degrees).  Strongly recommended for indoor use —
# without it MoGe guesses per-frame and the estimate swings wildly on flat
# scenes, breaking PnP.  Typical: 60-78 for laptop/USB webcams.
camera_fov_deg:     70

max_keyframes:      200
min_translation_m:  0.30
min_rotation_deg:   20.0
min_matches:        8
min_inliers:        15
pnp_reproj_err_px:  4.0

host: 0.0.0.0
port: 8240

# Uncomment to stream live poses + keyframe point clouds to a Rerun viewer
# running on this host.  Start the viewer first (`rerun` — defaults to
# gRPC on 127.0.0.1:9876).  Requires the optional pose-mcp [viz] extra:
# `uv sync --extra viz` in agent-mcp-servers/pose-mcp/.
# Either form works:
#   rerun_addr: 127.0.0.1:9876
#   rerun_addr: rerun+http://127.0.0.1:9876/proxy
rerun_addr: null
