# mono-slam-example worker configuration (DPVO backend).
#
# Camera intrinsics
# -----------------
# K is approximated from frame dimensions using the configured FOV.
# Replace focal_length_px with a real calibrated value when available.
#
# focal_length_px: if set, used directly as fx = fy.
#                  if omitted, derived from fov_deg and frame width.
fov_deg: 60.0          # horizontal FOV assumed when focal_length_px is absent
# focal_length_px: 600.0   # uncomment to override the FOV-derived value

# DPVO model weights
# ------------------
# Auto-downloaded by the orchestrator's _ensure_dpvo_weights() bootstrap on
# first run.  Relative paths are resolved against the DPVO install dir
# (deps/dpvo/), so the default below resolves to deps/dpvo/models/dpvo.pth.
# Pass an absolute path here to use a checkpoint outside the DPVO tree.
weights_path: models/dpvo.pth

# Tracking parameters
# -------------------
# frame_stride: push a frame to DPVO every Nth FrameSignal (per track).
#               Higher = less GPU load, coarser motion estimates.
frame_stride: 3

# DPVO advanced overrides (optional)
# -----------------------------------
# Any YACS key=value pairs to merge into the DPVO config.
# Example: enable loop closure (requires DPRetrieval installation):
#   dpvo_cfg_overrides:
#     - "LOOP_CLOSURE=True"
dpvo_cfg_overrides: []

# Viz side channel
# ----------------
# publish_viz: if true, the worker pushes each accepted pose to the hub on
#              participant "_mono_slam_viz" / topic "mono_slam.pose" so the
#              viz process can draw the trajectory.
publish_viz: true
