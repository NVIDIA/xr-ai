# MCP agent worker configuration.
# Auto-discovered by the launcher and passed as --config to mcp_agent_worker.

stt_server:  http://localhost:8103
mcp_server:  http://localhost:8200   # the composed MCP server (transcript + video skills)

silence_threshold: 0.01   # float32 RMS below which audio is silence
silence_duration:  0.8    # seconds of silence that ends an utterance
min_speech:        0.3    # minimum seconds of speech before STT fires

# ── Logging ──────────────────────────────────────────────────────────────────
# Per-process log level. PRIMARY source. If this field is removed/commented,
# the subprocess falls back to the XR_AI_LOG_LEVEL env var, then to INFO.
# Valid: DEBUG, INFO, WARNING, ERROR, CRITICAL.
log_level: INFO

# ── HTTP client logging ──────────────────────────────────────────────────────
# Level for httpx + httpcore loggers (the per-HTTP-request "POST ... 200 OK"
# lines emitted by these libraries).  Default WARNING — at INFO they fire
# per HTTP call, which floods the terminal during normal use (TTS sentence
# rate, /health probes, etc.).  File still captures everything at DEBUG.
# Independent of `log_level` and `nemo_log_level`. Valid: DEBUG, INFO,
# WARNING, ERROR, CRITICAL.
http_log_level: WARNING
