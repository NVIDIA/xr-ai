# Composed MCP server configuration for mcp-agent.
# Two sub-servers (transcript, video) are always mounted at /mcp.

host: 0.0.0.0
port: 8200

transcript:
  transcripts_dir: /tmp/xr_transcripts/mcp-agent

video:
  recordings_dir: /tmp/xr_recordings/mcp-agent   # must match xr_media_hub.yaml video_recording.out_dir
  out_dir:        /tmp/xr_video_queries/mcp-agent
