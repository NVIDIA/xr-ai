# Transcript MCP server configuration for mcp-agent.
# Auto-discovered by the launcher and passed as --config to transcript_mcp_server.
#
# HTTP ingest:  POST http://localhost:8200/ingest
# MCP endpoint: http://localhost:8200/mcp  (StreamableHTTP transport)

transcripts_dir: /tmp/xr_transcripts/mcp-agent   # persists across runs
host:            0.0.0.0
port:            8200

# ── Logging ──────────────────────────────────────────────────────────────────
# Per-process log level. PRIMARY source. If this field is removed/commented,
# the subprocess falls back to the XR_AI_LOG_LEVEL env var, then to INFO.
# Valid: DEBUG, INFO, WARNING, ERROR, CRITICAL.
log_level: INFO
