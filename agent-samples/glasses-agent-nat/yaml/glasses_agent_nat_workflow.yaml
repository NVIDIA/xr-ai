# NeMo Agent Toolkit workflow for the glasses-agent-nat request-time agent.
# Tool exposure lives here so the LLM can only call tools NAT can route.

function_groups:
  vlm_mcp:
    _type: mcp_client
    server:
      transport: streamable-http
      url: http://localhost:8240/mcp
    include:
      - ask_image
    tool_call_timeout: 60
    tool_overrides:
      ask_image:
        description: >-
          Inspect one image file captured by the glasses camera. Use only an
          image_path returned by the video tools in the current turn.

  video_mcp:
    _type: mcp_client
    server:
      transport: streamable-http
      url: http://localhost:8210/mcp
    include:
      - list_live_participants
      - get_latest_frame
    tool_call_timeout: 30
    tool_overrides:
      get_latest_frame:
        description: >-
          Return the latest live camera frame for a participant as a PNG path
          and timestamp. Call this before ask_image when no valid image_path is
          already provided in context.

  transcript_mcp:
    _type: mcp_client
    server:
      transport: streamable-http
      url: http://localhost:8200/mcp
    include:
      - add_transcript
      - query_transcripts
    tool_call_timeout: 30

  glasses_agent_tools:
    _type: glasses_agent_tools
    include:
      - describe_current_view

  glasses_worker_tasks:
    _type: glasses_worker_tasks
    include:
      - analyze_recording
      - check_guidance_step_complete
      - condense_observations
    # Worker-task LLM endpoints (agent_llm @ 8107, worker_llm @ 8106) come
    # from this sample's models.yaml, resolved relative to this workflow file.
    # Per AGENTS.md, all HTTP to AI services routes through xr-ai-models.
    models_yaml: models.yaml

llms:
  agent_llm:
    _type: openai
    model_name: llm
    base_url: http://localhost:8107/v1
    api_key: EMPTY
    temperature: 0.0
    max_tokens: 1024
    request_timeout: 180
    max_retries: 0
  # Note: a previous ``worker_llm`` entry was removed — it was never
  # referenced by ``workflow.llm_name`` or any other NAT-side consumer,
  # and the worker tasks now build their own clients from models.yaml.

workflow:
  _type: tool_calling_agent
  tool_names:
    - glasses_agent_tools
  llm_name: agent_llm
  verbose: false
  handle_tool_errors: true
  max_iterations: 8
  max_history: 8
  truncation_retry:
    max_retries: 2
    token_increment: 1024
  max_empty_response_retries: 1
  return_direct:
    - glasses_agent_tools__describe_current_view
  system_prompt: |
    You are an AI assistant integrated into smart glasses. You observe the world
    through the wearer's camera and help them understand their environment,
    remember past events, and learn from demonstrations.

    Context is provided in each request. It may include a scene summary, recent
    observations, available demonstrations, latest camera frame path, participant
    ID, reference time, and recent conversation.

    Be concise: respond with 1-3 short sentences unless giving step-by-step
    guidance. Use the observation timeline before calling tools.

    For current-view questions such as "what do you see?", call
    glasses_agent_tools__describe_current_view with the Participant value from
    context and the user's visual question. Do not call lower-level video or
    image tools directly.

    Never invent observations. Never construct or guess image file paths. The
    only valid image path is one returned by the video tools in the current turn
    or explicitly provided in the current context. If no valid frame path is in
    context, call the latest-frame tool first.

    Demonstration guidance is handled by the worker. When the user asks to walk
    through a stored demonstration, confirm that guidance has started rather than
    listing all steps yourself.
