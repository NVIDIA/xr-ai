[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "glasses-agent-nat-worker"
version = "0.1.0"
requires-python = ">=3.11,<3.13"
dependencies = [
    "xr-ai-agent",
    "xr-ai-logging",
    "numpy>=1.24",
    "Pillow>=10.0",
    "httpx>=0.27",
    "pyyaml>=6.0",
    "nvidia-nat[langchain,mcp]>=1.6",
    "pydantic>=2.7",
    # Neural VAD — requires onnxruntime for the ONNX inference backend.
    "silero-vad>=5.1",
    "onnxruntime>=1.17",
]

[tool.uv.sources]
xr-ai-agent   = { path = "../../../agent-sdk",            editable = true }
xr-ai-logging = { path = "../../../utils/xr-ai-logging",  editable = true }

[project.scripts]
glasses_agent_nat_worker = "glasses_agent_nat_worker:run"

[project.entry-points.'nat.plugins']
glasses_agent_nat_worker = "glasses_nat_register"

[tool.hatch.build.targets.wheel]
only-include = [
    "glasses_agent_nat_worker.py",
    "agent.py",
    "vad.py",
    "nat_agent.py",
    "nat_runtime.py",
    "glasses_nat_register.py",
    "glasses_nat_schemas.py",
    "glasses_nat_tasks.py",
    "processors.py",
    "memory.py",
    "config.py",
]
