# STT server configuration — nvidia/parakeet-tdt-0.6b-v3.
# Auto-discovered by xr-ai-launcher and passed as --config to stt_server.
# OpenAI-compatible API at http://localhost:8103/v1

# NeMo model name.
# nvidia/parakeet-tdt-0.6b-v3  — 0.6B TDT model; CC-BY-4.0; ~1.5 GB VRAM; English only
# nvidia/parakeet-rnnt-1.1b    — stronger, larger; same CC-BY-4.0 license
model: nvidia/parakeet-tdt-0.6b-v3

# Inference device: "cuda", "cpu", or "auto" (CUDA if available, else CPU).
device: auto

port: 8103
host: "0.0.0.0"

# NeMo + HuggingFace weight cache — resolved relative to this YAML file.
model_cache: ../models

# ── Logging ──────────────────────────────────────────────────────────────────
# Per-process log level. PRIMARY source. If this field is removed/commented,
# the subprocess falls back to the XR_AI_LOG_LEVEL env var, then to INFO.
# Valid: DEBUG, INFO, WARNING, ERROR, CRITICAL.
log_level: INFO

# ── NeMo logging ─────────────────────────────────────────────────────────────
# Level for NeMo's custom logger (the [NeMo I/W ...] lines emitted during
# model loading). Independent of the main `log_level` field above. NeMo's
# logger doesn't propagate to Python's root logger, so it needs a separate
# knob. If removed/commented, falls back to INFO.
# Valid: DEBUG, INFO, WARNING, ERROR, CRITICAL.
nemo_log_level: WARNING
