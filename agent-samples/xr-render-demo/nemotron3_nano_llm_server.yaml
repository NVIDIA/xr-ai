# Nemotron-3-Nano LLM server configuration —
# nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-NVFP4.
# Auto-discovered by xr-ai-launcher (filename matches the
# 'nemotron3_nano_llm_server' process command) and passed as --config.
# Exposes an OpenAI-compatible API at http://localhost:8107/v1 via vLLM.
#
# Reasoning mode: the model's chat template defaults to
# ``enable_thinking=True``.  vLLM's ``--reasoning-parser nano_v3`` splits
# the resulting ``<think>…</think>`` into message.reasoning_content so the
# actual answer in message.content is never polluted — this is what keeps
# voice TTS from reading the reasoning aloud.

model: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-FP8

host: "0.0.0.0"
port: 8107
hf_token: ""

# Shared weight + reasoning-parser cache.  Resolves relative to this YAML;
# ../../models lands in the repo-root models/ dir (same place the other
# ai-services write their weights).
model_cache: ../../models

# vLLM server knobs.
max_num_seqs:         8
tensor_parallel_size: 1
max_model_len:        32768

# agent-llm is THIRD (last) in the load order: vlm → llm → agent-llm.
# vLLM 0.20+ added a startup pre-flight check (request_memory in
# vllm/v1/worker/utils.py:403) that requires:
#
#   free_GPU_memory_at_startup  >=  gpu_memory_utilization × total_GPU
#
# Importantly, this fraction is THIS PROCESS's EXCLUSIVE cap — peer
# vLLMs' residence is OUTSIDE the budget, not absorbed by it.  So each
# subsequent vLLM's fraction must fit in WHAT'S CURRENTLY FREE on the
# GPU at its startup.
#
# Math when agent-llm starts (after sequential vlm + llm load):
#   total                          = 95 GiB
#   vlm steady residence           ≈ 19 GiB   (cap 0.20)
#   llm steady residence           ≈ 24 GiB   (cap 0.25)
#   STT + hub + cloudxr            ≈ 10 GiB
#   free_at_startup                ≈ 95 − 53  ≈ 42 GiB
#   max gpu_memory_utilization     = 42 / 95   ≈ 0.44
#
# 0.40 × 95 = 38 GiB cap (with ~4 GiB pre-flight margin).  Inside that:
#   own weights (FP8 30B)          ≈ 30 GiB
#   own activations (B=4, ctx=32K) ≈  3 GiB
#   →  Available KV  ≈ 38 − 30 − 3  ≈  5 GiB     (or ~15 GiB if NVFP4)
#
# Bump to 0.42-0.44 if you need more KV concurrency, but stay below the
# free-memory ceiling above or the pre-flight check fails fast.
cuda_visible_devices: "0"
gpu_memory_utilization: 0.40

# Skip CUDA graph capture + FlashInfer MoE autotune at startup.  For
# NemotronH-30B-A3B-NVFP4 those two phases are silent (no log output)
# and take 3-8 min on first run — bad UX for a voice agent where the
# user is waiting for the server to become healthy.  Eager mode starts
# in ~5 s after weight load and is 10-20% slower per token, which is
# imperceptible for this workload (<250 tokens per turn, STT+VAD+TTS
# already dominate turn latency).  Set to ``false`` if you want
# maximum throughput and can wait for graph capture to finish.
# Set to true for fast startup during development (skips 3-8 min CUDA graph
# capture). Set to false in production for ~2x inference speed (~50 tok/s
# vs 26 tok/s), which cuts per-turn latency from ~90s to ~45s.
enforce_eager: true
