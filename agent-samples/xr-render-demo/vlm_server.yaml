# VLM server configuration — nvidia/Cosmos-Reason1-7B.
# Auto-discovered by xr-ai-launcher and passed as --config to vlm_server.
# OpenAI-compatible API at http://localhost:8100/v1 (accepts image_url in messages)

# HuggingFace model ID — any Qwen2.5-VL-compatible model is supported.
# nvidia/Cosmos-Reason1-7B   — NVIDIA VLM; Apache 2.0 + NVIDIA Open Model License;
#                              no HF login required; ~16 GB VRAM at BF16
# nvidia/Cosmos-Reason2-8B   — stronger reasoning; gated — requires HF login + license
model: nvidia/Cosmos-Reason1-7B

# HuggingFace token — required for gated models (e.g. Cosmos-Reason2-8B).
# Accept license at https://huggingface.co/nvidia/Cosmos-Reason2-8B first.
# !! Do not commit this file with a real token !!
hf_token: ""

port: 8100
host: "0.0.0.0"
cuda_visible_devices: "0"   # all three vLLMs share GPU 0; sequenced by launcher health_url

model_cache: ../models

# Single GPU shared by three vLLMs.  The orchestrator declares ``health_url``
# on each so the launcher serializes their cold-start memory profile pass —
# vlm loads first and profiles alone, then llm, then agent-llm.
#
# vLLM 0.20+ enforces a startup pre-flight check (request_memory in
# vllm/v1/worker/utils.py:403):
#
#   free_GPU_memory_at_startup  >=  gpu_memory_utilization × total_GPU
#
# This fraction is THIS PROCESS's EXCLUSIVE cap — peers' residence is
# OUTSIDE the budget, not absorbed.  So each subsequent vLLM's fraction
# must fit in CURRENTLY FREE memory at its startup, which is why
# sequential loading matters: agent-llm needs to know how much vlm + llm
# already consumed (deterministic only with serialized startup).
#
# vlm is FIRST in load order, so free_at_startup is ~95 GiB.  0.20 × 95
# = 19 GiB cap holds Cosmos-Reason1-7B (~16 GiB BF16 weights) plus ~3
# GiB KV for short-context single-image queries.
gpu_memory_utilization: 0.20
enforce_eager: true
