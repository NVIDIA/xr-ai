# xr-render-demo worker configuration.
# Paths resolve relative to this file's directory.

# ── AI model services ─────────────────────────────────────────────────────────
# Model endpoints (URLs, presets, timeouts) are declared in models.yaml and
# loaded via xr-ai-models.  Edit that file to change which model runs where.
# Path is resolved relative to THIS file's directory (`yaml/`), so the bare
# `models.yaml` here points at `agent-samples/xr-render-demo/yaml/models.yaml`.
models_yaml: models.yaml

# ── MCP server base URLs ──────────────────────────────────────────────────────
render_mcp_url: http://localhost:8220
oxr_mcp_url:    http://localhost:8230
vlm_mcp_url:    http://localhost:8240
video_mcp_url:  http://localhost:8210

# ── Voice activity detection (Silero VAD, ONNX backend) ──────────────────────
# silence_duration: seconds of trailing silence that ends an utterance.
# min_speech: minimum cumulative speech before STT fires (filters short blips).
# silero_threshold: speech-probability gate (0..1). Lower = more sensitive
#   (catches quieter/faster speech). Default 0.5 often misses the onset of a
#   word; 0.3 captures it earlier.
silence_duration:  0.8
min_speech:        0.15
silero_threshold:  0.3

# ── Speech-only opt-in gate (xr-ai-voicegate) ────────────────────────────────
# Forwarded to ``xr-ai-voicegate.VoiceGateConfig``. The gate sits between
# STT and the agentic loop; only the speech path is affected — the text
# data channel is never gated.
#
# Default is always-on (empty ``magic_phrases``): every STT transcript
# becomes a query, matching the pre-gate worker behavior. Populate the
# list to require a wake word before the agent responds.
voice_gate:
  # Strict-prefix phrases (case-insensitive, no leading filler words).
  # The matched phrase is stripped before the query reaches the agentic
  # loop. Configure several wordings to support multiple natural
  # greetings, e.g.:
  #   magic_phrases:
  #     - "agent"
  #     - "hey agent"
  magic_phrases:    []

  # Follow-up grace window. After a magic-phrase match, the next
  # utterance from the same participant within this many seconds
  # bypasses the gate.
  followup_grace_s: 5.0

  # Audible "I heard you" feedback. When true AND ``magic_phrases`` is
  # non-empty, a short two-tone chime plays on the return audio track
  # the moment a phrase is matched. No effect when ``magic_phrases`` is
  # empty (always-on mode has no fresh-match event to ride).
  listening_chime:  false
