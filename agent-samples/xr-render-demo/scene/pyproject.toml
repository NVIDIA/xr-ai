[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "xr-render-scene"
version = "0.1.0"
description = "Sample-local scene and LOVR capability for XR render demo."
requires-python = ">=3.11,<3.13"
dependencies = [
    "xr-ai-launcher",
    "xr-ai-logging",
    "xr-ai-nat[services]",
    "msgpack>=1.0",
    "pyyaml>=6.0",
    "pyzmq>=27.0",
]

[project.entry-points."nat.plugins"]
xr_render_scene = "xr_render_scene.functions"

[tool.uv.sources]
xr-ai-launcher = { path = "../../../utils/xr-ai-launcher", editable = true }
xr-ai-logging = { path = "../../../utils/xr-ai-logging", editable = true }
xr-ai-nat = { path = "../../../agent-sdk/xr-ai-nat", editable = true }

[project.scripts]
xr_render_scene = "xr_render_scene.__main__:run"

[tool.hatch.build.targets.wheel]
packages = ["xr_render_scene"]
