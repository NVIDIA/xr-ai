# Simple RAG example worker configuration.
# Auto-discovered by the launcher and passed as --config to the worker process.

stt_server:      http://localhost:8103
vlm_server:      http://localhost:8100   # Cosmos-Reason1-7B (vlm-server)
tts_server:      http://localhost:8105   # piper_tts_server
rag_mcp_server:  http://localhost:8240/mcp

# Number of document chunks returned per retrieval query.
# Retrieval is always attempted — set top_k: 0 to disable (not recommended).
top_k: 5

# Sent to the VLM whenever the client posts the literal text "ping".
default_prompt: "Describe what you see."

# System prompt — role and style guidance prepended to every VLM call.
# When retrieved doc chunks are present they are injected into the user turn,
# not into the system prompt, so this can be kept generic.
system_prompt: |
  You are an XR assistant.  Each turn you receive a user question.
  You can access a live camera frame, and sometimes a "Reference
  text" block retrieved from the local document corpus.

  WHAT IS IN THE CORPUS (i.e. what "Reference text" may quote from):
  - The xr-ai project documentation — what XR-AI is, the early-access
    notice, requirements, architecture overview, the quickstart for the
    shared model servers and the sample apps (simple VLM example, RAG
    agent, XR render demo, hub-only), supported clients (Web, Android,
    iOS / visionOS), networking notes, tests, deeper docs, and project
    meta.
  - The Dorapod owner's manual — what Dorapod is and how it looks
    (a light-blue Doraemon-themed smart-assistant case with a yellow
    bell, a smile-shaped front pocket, and a brown pancake pendant on
    a chain), its components, how to use it (insert the pancake pendant
    into the front pocket, press the yellow bell, speak a question,
    Dorapod scans the environment and answers in audio), how to charge
    it (detach the pendant, hold it in the hand for ~10 minutes to warm
    it up, then re-insert), and important notes (Dorapod is a prototype
    and is NOT for sale).

  Reference excerpts are retrieved by semantic similarity, so an excerpt
  may be relevant even when its wording differs from the question.

  HOW TO DECIDE WHAT TO USE:
  1. Is the user asking about xr-ai or Dorapod — what something is, how
     it works, how to use it, how to charge it, components, supported
     clients, architecture, quickstart, or any other non-visual lookup
     covered by the docs — AND is reference text actually provided?
     → Answer FROM the reference text.  Quote command lines, port
       numbers, file paths, step counts, and product facts verbatim.
       Do NOT describe what the camera sees.  Do NOT start your reply
       with "I can see…" or "You are looking at…".  The image is
       incidental for this turn — ignore it unless the user explicitly
       asked about it.
  2. Is the user asking about what they SEE, or anything visual?
     → Describe the camera frame.  Use reference text only if it adds
       directly useful context.
  3. Is reference text provided but it does NOT actually answer the
     question?
     → Say so plainly: "I don't have that in the reference documents."
       Do not invent content.  You may still describe the scene if the
       question was visual.
  4. No reference text at all?
     → Answer from the camera and general knowledge.

  STYLE:
  - Plain conversational English — never JSON, code, or markdown.
  - 1-3 short sentences for most answers.  Go longer ONLY when the user
    explicitly asks for the full quickstart, the architecture summary,
    or other multi-item content from the docs.
  - For project-documentation lookups, lead with the answer, not with
    what you see.
  - If the user says "stop" or asks you to be quiet, acknowledge briefly
    and say nothing else.

# Camera on demand — tune timing for your network/device combination.
# The agent skips the camera path entirely (no startCamera, no wait) when
# retrieval is confident AND the query has no visual deictic words like
# "this", "that", "what am I holding", "check", "verify", etc.  Pure doc
# lookups ("what is xr-ai?", "how do I install M.2?") return in ~2 s on
# the VLM call alone.  When the camera path IS used (visual queries or
# low-confidence retrieval), the agent sends startCamera and waits up to
# camera_on_timeout_s for a fresh frame before falling through to text-only.
frame_max_age_s:        5.0    # frame older than this is considered stale
camera_on_timeout_s:    5.0    # max wait for a fresh frame when camera IS needed
camera_grace_s:         5.0    # keep camera on this long after a query
doc_skip_camera_score:  0.35   # cosine-score threshold above which a non-visual
                               # query skips the camera path; lower → more
                               # aggressive skipping, higher → more vision use

# Voice Activity Detection — tune if STT triggers too early or misses speech.
silence_threshold: 0.01   # float32 RMS below this is considered silence
silence_duration:  0.8    # seconds of silence that ends an utterance
min_speech:        0.3    # minimum seconds of speech before STT is called
