name: nightly XR AI test

# Runs the `gpu`-marked pytest suite on a self-hosted runner labelled
# `gpu`. These tests need real GPU / Docker / NVENC hardware and are
# filtered out of the default `tests` workflow (which targets
# `ubuntu-latest`). Mirrors the local `tests/run_local_gpu_tests.sh`
# entry point.

on:
  schedule:
    - cron: "0 4 * * *"  # 04:00 UTC daily
  workflow_dispatch:
  # Also fire on PRs that edit this workflow itself, so changes to the
  # CI definition get exercised against the GPU runner before merge.
  pull_request:
    paths:
      - .github/workflows/nightly-xr-ai-test.yml

# Queue overlapping runs instead of cancelling; the previous nightly
# may still be running when the next cron fires on a busy GPU host.
concurrency:
  group: nightly-xr-ai-test
  cancel-in-progress: false

jobs:
  pytest:
    name: pytest (gpu)
    runs-on: gpu
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover CUDA toolkit
        # Prefer CUDA 13.0 (current target), but fall back through the
        # usual symlinks and finally whatever `nvcc` is on PATH so we
        # don't pin the workflow to a single host layout.
        run: |
          set -euo pipefail
          candidates=(
            "/usr/local/cuda-13.0"
            "/usr/local/cuda-13"
            "/usr/local/cuda"
            "${CUDA_HOME:-}"
          )
          for c in "${candidates[@]}"; do
            [[ -z "$c" ]] && continue
            if [[ -x "$c/bin/nvcc" ]]; then
              echo "Selected CUDA toolkit: $c"
              echo "CUDA_HOME=$c"             >> "$GITHUB_ENV"
              # CUDACXX is the env var FlashInfer / torch.cpp_extension /
              # cmake all honor. Setting it explicitly stops downstream
              # JIT compilers from guessing (and previously baking the
              # wrong absolute path into build.ninja).
              echo "CUDACXX=$c/bin/nvcc"      >> "$GITHUB_ENV"
              echo "$c/bin"                   >> "$GITHUB_PATH"
              exit 0
            fi
          done
          if nvcc_path="$(command -v nvcc)"; then
            cuda_home="$(dirname "$(dirname "$nvcc_path")")"
            echo "Selected CUDA toolkit (from PATH): $cuda_home"
            echo "CUDA_HOME=$cuda_home"       >> "$GITHUB_ENV"
            echo "CUDACXX=$nvcc_path"         >> "$GITHUB_ENV"
            exit 0
          fi
          echo "::error::No CUDA toolkit found in candidates or on PATH"
          exit 1

      - name: Check CUDA compiler
        run: |
          which nvcc
          nvcc --version
          nvcc --list-gpu-arch | grep compute_89

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            tests/pyproject.toml
            tests/uv.lock
            agent-sdk/pyproject.toml
            server-runtime/pyproject.toml

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Sync test workspace
        working-directory: tests
        run: uv sync --python 3.12

      - name: Run gpu-marked tests
        working-directory: tests
        run: uv run pytest -v --tb=short --color=yes -m gpu
