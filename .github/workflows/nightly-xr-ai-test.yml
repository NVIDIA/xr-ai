name: nightly XR AI test

# Runs the `gpu`-marked pytest suite on a self-hosted runner labelled
# `gpu`. These tests need real GPU / Docker / NVENC hardware and are
# filtered out of the default `tests` workflow (which targets
# `ubuntu-latest`). Mirrors the local `tests/run_local_gpu_tests.sh`
# entry point.

on:
  schedule:
    - cron: "0 4 * * *"  # 04:00 UTC daily
  workflow_dispatch:
  # Also fire on PRs that edit this workflow itself, so changes to the
  # CI definition get exercised against the GPU runner before merge.
  pull_request:
    paths:
      - .github/workflows/nightly-xr-ai-test.yml

# Queue overlapping runs instead of cancelling; the previous nightly
# may still be running when the next cron fires on a busy GPU host.
concurrency:
  group: nightly-xr-ai-test
  cancel-in-progress: false

jobs:
  pytest:
    name: pytest (gpu)
    runs-on: gpu
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover CUDA toolkit
        # Prefer CUDA 13.0 (current target), but fall back through the
        # usual symlinks and finally whatever `nvcc` is on PATH so we
        # don't pin the workflow to a single host layout.
        run: |
          set -euo pipefail
          candidates=(
            "/usr/local/cuda-13.0"
            "/usr/local/cuda-13"
            "/usr/local/cuda"
            "${CUDA_HOME:-}"
          )
          for c in "${candidates[@]}"; do
            [[ -z "$c" ]] && continue
            if [[ -x "$c/bin/nvcc" ]]; then
              echo "Selected CUDA toolkit: $c"
              echo "CUDA_HOME=$c"             >> "$GITHUB_ENV"
              # CUDACXX is the env var FlashInfer / torch.cpp_extension /
              # cmake all honor. Setting it explicitly stops downstream
              # JIT compilers from guessing (and previously baking the
              # wrong absolute path into build.ninja).
              echo "CUDACXX=$c/bin/nvcc"      >> "$GITHUB_ENV"
              echo "$c/bin"                   >> "$GITHUB_PATH"
              exit 0
            fi
          done
          if nvcc_path="$(command -v nvcc)"; then
            cuda_home="$(dirname "$(dirname "$nvcc_path")")"
            echo "Selected CUDA toolkit (from PATH): $cuda_home"
            echo "CUDA_HOME=$cuda_home"       >> "$GITHUB_ENV"
            echo "CUDACXX=$nvcc_path"         >> "$GITHUB_ENV"
            exit 0
          fi
          echo "::error::No CUDA toolkit found in candidates or on PATH"
          exit 1

      - name: Check CUDA compiler
        run: |
          which nvcc
          nvcc --version
          nvcc --list-gpu-arch | grep compute_89

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            tests/pyproject.toml
            tests/uv.lock
            agent-sdk/pyproject.toml
            server-runtime/pyproject.toml

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Sync test workspace
        working-directory: tests
        run: uv sync --python 3.12

      - name: Scrub stale FlashInfer build caches
        # On the persistent `gpu` runner, FlashInfer caches its JIT
        # compile output under /ephemeral/cache/flashinfer. The cached
        # build.ninja files bake in the absolute path of nvcc at
        # generation time — so once the host's nvcc moves (e.g. an old
        # `/usr/bin/nvcc` install was removed in favour of CUDA 13.0),
        # `ninja -f build.ninja` fails with exit 127 / "nvcc: not found".
        # Drop any cached build dir that still references a stale path so
        # FlashInfer regenerates it against the current $CUDACXX.
        run: |
          set -euo pipefail
          roots=(
            "/ephemeral/cache/flashinfer"
            "$HOME/.cache/flashinfer"
          )
          for root in "${roots[@]}"; do
            [[ -d "$root" ]] || continue
            # Find build.ninja files that point at a now-missing nvcc.
            while IFS= read -r f; do
              dir="$(dirname "$f")"
              echo "Scrubbing stale FlashInfer cache: $dir"
              rm -rf "$dir"
            done < <(grep -RIl --include='build.ninja' '/usr/bin/nvcc' "$root" 2>/dev/null || true)
          done

      - name: Diagnose nvcc resolution for vLLM EngineCore
        # The workload subprocess (vLLM EngineCore) is two uv-run hops
        # deep and resolves nvcc to a literal /usr/bin/nvcc somewhere.
        # These probes mirror what that subprocess actually sees, so we
        # can identify whether it's the host layout, a runner-level env
        # var, a stale persistent cache, or torch's own resolution.
        # Diagnostic only — never fail the run on probe output.
        continue-on-error: true
        run: |
          set +e
          echo "=== /usr/bin/nvcc on host ==="
          ls -la /usr/bin/nvcc 2>&1
          readlink -f /usr/bin/nvcc 2>&1
          dpkg -S /usr/bin/nvcc 2>/dev/null
          echo
          echo "=== runner-level env files (CUDA_HOME/CUDACXX/NVCC/CUDA_PATH) ==="
          grep -HE '^(CUDA_HOME|CUDACXX|NVCC|CUDA_PATH)=' /etc/environment 2>/dev/null
          grep -RHE '^(CUDA_HOME|CUDACXX|NVCC|CUDA_PATH)=' /etc/profile.d 2>/dev/null
          echo
          echo "=== torch view from nested llama_nemotron venv ==="
          uv run --directory ai-services/llm/llama_nemotron python - <<'PY' 2>&1
          import os
          try:
              from torch.utils.cpp_extension import CUDA_HOME, _find_cuda_home
              print("torch CUDA_HOME       =", CUDA_HOME)
              print("torch _find_cuda_home =", _find_cuda_home())
          except Exception as e:
              print("torch import failed:", e)
          print("env CUDA_HOME =", os.environ.get("CUDA_HOME"))
          print("env CUDACXX   =", os.environ.get("CUDACXX"))
          print("env CUDA_PATH =", os.environ.get("CUDA_PATH"))
          print("env NVCC      =", os.environ.get("NVCC"))
          PY
          echo
          echo "=== hunt for /usr/bin/nvcc in persistent caches ==="
          for d in "/ephemeral/cache/flashinfer" "/ephemeral/cache/vllm" \
                   "$HOME/.cache/torch_extensions" "$HOME/.cache/vllm" \
                   "$HOME/.cache/flashinfer" "$HOME/.triton" \
                   "ai-services/llm/llama_nemotron/.venv"; do
            if [ -d "$d" ]; then
              echo "--- $d ---"
              grep -RIl '/usr/bin/nvcc' "$d" 2>/dev/null | head -20
            else
              echo "--- $d (does not exist) ---"
            fi
          done
          echo
          echo "=== which -a nvcc ==="
          which -a nvcc 2>&1

      - name: Run gpu-marked tests
        working-directory: tests
        run: uv run pytest -v --tb=short --color=yes -m gpu
