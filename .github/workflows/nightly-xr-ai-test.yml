name: nightly XR AI test

# Runs the `gpu`-marked pytest suite on a self-hosted runner labelled
# `gpu`. These tests need real GPU / Docker / NVENC hardware and are
# filtered out of the default `tests` workflow (which targets
# `ubuntu-latest`). Mirrors the local `tests/run_local_gpu_tests.sh`
# entry point.

on:
  schedule:
    - cron: "0 4 * * *"  # 04:00 UTC daily
  workflow_dispatch:
  # Also fire on PRs that edit this workflow itself, so changes to the
  # CI definition get exercised against the GPU runner before merge.
  pull_request:
    paths:
      - .github/workflows/nightly-xr-ai-test.yml

# Queue overlapping runs instead of cancelling; the previous nightly
# may still be running when the next cron fires on a busy GPU host.
concurrency:
  group: nightly-xr-ai-test
  cancel-in-progress: false

jobs:
  pytest:
    name: pytest (gpu)
    runs-on: gpu
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover CUDA toolkit
        # Prefer 13.0 but fall back so we don't pin to one host layout.
        run: |
          set -euo pipefail
          candidates=(
            "/usr/local/cuda-13.0"
            "/usr/local/cuda-13"
            "/usr/local/cuda"
            "${CUDA_HOME:-}"
          )
          for c in "${candidates[@]}"; do
            [[ -z "$c" ]] && continue
            if [[ -x "$c/bin/nvcc" ]]; then
              echo "Selected CUDA toolkit: $c"
              echo "CUDA_HOME=$c"             >> "$GITHUB_ENV"
              # CUDACXX: FlashInfer / torch.cpp_extension / cmake all honor it.
              echo "CUDACXX=$c/bin/nvcc"      >> "$GITHUB_ENV"
              echo "$c/bin"                   >> "$GITHUB_PATH"
              exit 0
            fi
          done
          if nvcc_path="$(command -v nvcc)"; then
            cuda_home="$(dirname "$(dirname "$nvcc_path")")"
            echo "Selected CUDA toolkit (from PATH): $cuda_home"
            echo "CUDA_HOME=$cuda_home"       >> "$GITHUB_ENV"
            echo "CUDACXX=$nvcc_path"         >> "$GITHUB_ENV"
            exit 0
          fi
          echo "::error::No CUDA toolkit found in candidates or on PATH"
          exit 1

      - name: Check CUDA compiler
        run: |
          which nvcc
          nvcc --version
          nvcc --list-gpu-arch | grep compute_89

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            tests/pyproject.toml
            tests/uv.lock
            agent-sdk/pyproject.toml
            server-runtime/pyproject.toml

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Sync test workspace
        working-directory: tests
        run: uv sync --python 3.12

      - name: Purge leftover GPU-holding processes and containers (pre)
        # Persistent runner: scrub docker containers, pip-mode vLLM/wrappers,
        # and stale FlashInfer build caches. Assert ≥30 GiB free after.
        run: |
          set -euo pipefail
          echo "--- (1) xr-ai-vllm-* containers ---"
          leftovers=$(docker ps -aq --filter 'name=^xr-ai-vllm-' || true)
          if [ -n "$leftovers" ]; then
            docker ps -a --filter 'name=^xr-ai-vllm-' --format '  {{.Names}} ({{.Status}})'
            docker rm -f $leftovers
          else
            echo "  (none)"
          fi
          echo "--- (2) pip-backend vLLM + wrapper processes ---"
          for pat in 'vllm serve' '_llm_server'; do
            if pgrep -af "$pat" >/dev/null 2>&1; then
              pgrep -af "$pat" | sed 's/^/  killing: /'
              pkill -TERM -f "$pat" || true
            fi
          done
          # Brief grace, then SIGKILL anything that ignored SIGTERM.
          sleep 1
          for pat in 'vllm serve' '_llm_server'; do
            pkill -KILL -f "$pat" 2>/dev/null || true
          done
          echo "--- (3) stale FlashInfer build caches ---"
          for root in /ephemeral/cache/flashinfer "$HOME/.cache/flashinfer"; do
            [ -d "$root" ] || continue
            while IFS= read -r f; do
              d="$(dirname "$f")"
              echo "  scrubbing $d"
              rm -rf "$d"
            done < <(grep -RIl --include='build.ninja' '/usr/bin/nvcc' "$root" 2>/dev/null || true)
          done
          echo "--- nvidia-smi ---"
          nvidia-smi --query-gpu=index,name,memory.free,memory.total \
                     --format=csv,noheader
          free_mib=$(nvidia-smi --query-gpu=memory.free --format=csv,noheader,nounits | head -n1)
          if [ "${free_mib:-0}" -lt 30000 ]; then
            echo "::error::Only ${free_mib} MiB free on GPU 0 — expected >=30000 MiB after purge"
            nvidia-smi
            exit 1
          fi

      - name: Run gpu-marked tests
        working-directory: tests
        run: uv run pytest -v --tb=short --color=yes -m gpu

      - name: Purge GPU-holding processes and containers (post)
        # Same scrub as pre, so a failed run doesn't leak forward.
        if: always()
        run: |
          set -u
          leftovers=$(docker ps -aq --filter 'name=^xr-ai-vllm-' || true)
          if [ -n "$leftovers" ]; then
            docker ps -a --filter 'name=^xr-ai-vllm-' --format '  {{.Names}} ({{.Status}})'
            docker rm -f $leftovers || true
          fi
          for pat in 'vllm serve' '_llm_server'; do
            pkill -TERM -f "$pat" 2>/dev/null || true
          done
          sleep 1
          for pat in 'vllm serve' '_llm_server'; do
            pkill -KILL -f "$pat" 2>/dev/null || true
          done
