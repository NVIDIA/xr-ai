# Configuration with detection disabled for faster inference

server:
  host: "localhost"
  port: 50051
  max_workers: 2
  target_fps: 5.0  # Higher FPS without detection overhead
  gpu_id: 0

model:
  device: "cuda:0"
  
  detection:
    enabled: false  # 🚫 DETECTION DISABLED - Faster inference, SAM-only mode
    device: "cuda:0"
    detector: "dino"
    box_threshold: 0.2
    text_threshold: 0.2
    nms_threshold: 0.5
    precision: "float16"  # Model precision: "float16" or "float32"
    
  segmentation:
    device: "cuda:0"
    sam_variant: "sam"  # Must use "sam" when detection is disabled
    batched_sam: true
    trt_sam: true
    
  clip:
    device: "cuda:0"
    model_name: "ViT-B-32"
    precision: "fp16"
    batch_size: 8
    batched_clip: true
    trt_clip: true
    
  captioning:
    device: "cuda:0"
    class_set: "ram"
    tagging_threshold: 0.64
    add_bg_classes: true
    accumu_classes: true
    precision: "float16"
    
  visualization:
    device: "cuda:0"
    similarity_threshold: 0.86
    clip_model: "ViT-B-32"
    precision: "fp16"
    batch_size: 1
    use_trt: false
    
  mapping:
    device: "cuda:0"
    mask_conf_threshold: 0.25
    sim_threshold: 0.5
    skip_bg: false
    object_based_downsampling: false

paths:
  gsa_path: "./external/Grounded-Segment-Anything"
  model_weights_dir: "./model_weights"
  temp_output_dir: "./main_server/temp_output_dir"