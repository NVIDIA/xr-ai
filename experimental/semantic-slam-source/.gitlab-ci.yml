stages:
  - lint

lint:
  stage: lint
  image: python:3.8
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  variables:
    PRE_COMMIT_HOME: ${CI_PROJECT_DIR}/.cache/pre-commit
  cache:
    paths:
      - ${PRE_COMMIT_HOME}
  script:
    - git config --global --add safe.directory ${CI_PROJECT_DIR}
    - pip install --upgrade pre-commit
    - SKIP=swiftformat pre-commit run --files $(git diff-tree --no-commit-id --name-only -m -r "$CI_COMMIT_SHA")
