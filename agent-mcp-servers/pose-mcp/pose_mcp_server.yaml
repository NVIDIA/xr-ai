# Pose MCP server reference configuration.
#
# Approximate indoor monocular localization. Each call to estimate_pose
# returns a 6DoF pose anchored to the map's first keyframe. The map persists
# across restarts in `map_dir`. Delete that directory (or call reset_map) to
# start over.
#
# MCP endpoint: http://localhost:8240/mcp  (StreamableHTTP transport)

# Where keyframes (metadata + per-keyframe arrays) live.  Survives process
# restart; clear by deleting the directory or calling the reset_map tool.
# Default is /tmp so the server runs unprivileged out of the box; point it
# at a persistent location (`~/.local/share/xr-ai/pose-map`, `/var/lib/...`
# under your service user, etc.) once you want the map to outlive reboots.
# Leading `~` is expanded against $HOME at startup.
map_dir: /tmp/xr-ai/pose-map

# Backend selection.  "auto" picks CUDA if available, otherwise CPU.
device: auto

# MoGe model variant.  ViT-S (35M) keeps cold start under a few seconds;
# ViT-B (104M) is more accurate but heavier.
moge_model: Ruicheng/moge-2-vits-normal

# Horizontal FOV (degrees) of your camera.  When unset, MoGe estimates it
# per frame from the image content — fine for varied outdoor scenes, but
# on flat indoor walls / desks MoGe's estimate swings 2-3× between adjacent
# frames and breaks PnP.  If you see `state=bootstrap` forever with the
# `fov=…` in the log moving around, set this to your camera's true FOV.
# Typical values:
#   laptop webcam        : ~60
#   USB webcam (Logitech): ~70-78
#   phone main camera    : ~65-75
#   GoPro / action cam   : ~120
# Wipe the map after changing this so old keyframes (which were built with
# the wrong FOV) don't poison localization.
camera_fov_deg:

# Map growth controls.
max_keyframes:       200    # hard cap; oldest evicted when reached
min_translation_m:   0.30   # insert new keyframe when pose translates more than this
min_rotation_deg:    20.0   # ...or rotates more than this

# PnP RANSAC thresholds.
min_inliers:         30     # below this we report state="lost"
pnp_reproj_err_px:   4.0

# Server bind.
host: 0.0.0.0
port: 8240

# Optional Rerun viewer sink.  Start the viewer first (`rerun` — defaults
# to gRPC on 127.0.0.1:9876) and point this at it.  Either form works:
#   rerun_addr: 127.0.0.1:9876
#   rerun_addr: rerun+http://127.0.0.1:9876/proxy
# null / commented = sink disabled, no rerun-sdk import at runtime.
rerun_addr: null
