# Video MCP server reference configuration.
# Copy to your agent sample root as video_mcp_server.yaml and edit.
#
# Recorded operations delegate to video-memory-service. Live-frame compatibility
# uses this process's own hub IPC subscription.
# If the recorded-video service is unavailable at startup, this adapter exposes
# its live-only legacy tool set until it is restarted.
#
# MCP endpoint: http://localhost:8210/mcp  (StreamableHTTP transport)

host: 0.0.0.0
port: 8210
service_endpoint: tcp://127.0.0.1:8310
hub_pub: ipc:///tmp/xr_hub_pub
hub_push: ipc:///tmp/xr_hub_in
out_dir: /tmp/xr_video_queries  # live PNG exports only; the service owns recorded outputs
