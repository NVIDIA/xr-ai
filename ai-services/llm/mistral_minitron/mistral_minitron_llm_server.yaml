# mistral-minitron-llm-server — vLLM configuration.
# OpenAI-compatible API at http://localhost:8101/v1  (served-model-name: "llm")

model: nvidia/Mistral-NeMo-Minitron-8B-Instruct

host: "0.0.0.0"
port: 8101
hf_token: ""

# Shared weight cache — resolves relative to this YAML.
model_cache: ../../../models

# Pin to a specific GPU (or comma-separated list for multi-GPU).
# Unset to use all GPUs visible to the process.
# cuda_visible_devices: "0"

# vLLM knobs.
max_num_seqs:           8
tensor_parallel_size:   1
max_model_len:          32768
gpu_memory_utilization: 0.85
enforce_eager:          false

# ── Logging ──────────────────────────────────────────────────────────────────
# Per-process log level. PRIMARY source. If this field is removed/commented,
# the subprocess falls back to the XR_AI_LOG_LEVEL env var, then to INFO.
# Valid: DEBUG, INFO, WARNING, ERROR, CRITICAL.
log_level: INFO

# ── vLLM logging ─────────────────────────────────────────────────────────────
# Level for vLLM's logger (the (APIServer|EngineCore pid=...) INFO lines
# during cold start). Exported as VLLM_LOGGING_LEVEL env var BEFORE
# os.execvp into `vllm serve`, so it controls vLLM's own logger across the
# process replacement. Independent of the main `log_level` field above.
# If removed/commented, falls back to INFO.
# Valid: DEBUG, INFO, WARNING, ERROR, CRITICAL.
vllm_log_level: WARNING
