# llama-nemotron-llm-server — vLLM configuration.
# OpenAI-compatible API at http://localhost:8106/v1  (served-model-name: "llm")

model: nvidia/Llama-3.1-Nemotron-Nano-8B-v1

host: "0.0.0.0"
port: 8106
hf_token: ""

# Shared weight cache — resolves relative to this YAML.
model_cache: ../../../models

# Pin to a specific GPU (or comma-separated list for multi-GPU).
# Unset to use all GPUs visible to the process.
# cuda_visible_devices: "0"

# vLLM knobs.
max_num_seqs:           8
tensor_parallel_size:   1
max_model_len:          32768
gpu_memory_utilization: 0.85
enforce_eager:          false

# Tool calling via vLLM's built-in Llama-3 parser.
# Set enable_tool_choice: false to disable tool calling entirely.
enable_tool_choice: true
tool_call_parser:   llama3_json

# vLLM runtime — pip-installed vllm (default) or NGC docker container.
#   pip     — vllm CLI from this wrapper's venv (today's behavior)
#   docker  — `docker run nvcr.io/nvidia/vllm:<tag> vllm serve …`
# Both honor the same config keys above; only the runtime hosting vllm differs.
# docker mode requires Docker Engine + NVIDIA Container Toolkit and a
# `docker login nvcr.io` (or NGC_API_KEY in the environment).
vllm_backend: docker

# Container image used when vllm_backend: docker.  Override to pin a different
# tag, an internal mirror, or a custom build.
vllm_image: nvcr.io/nvidia/vllm:26.04-py3
